theme: just-the-docs

# -------------------------
# Site metadata
# -------------------------
title: "Project Middleware"
description: >-
  ProjectMiddleware is an API transformation layer that lets clients register
  mapping rules, call external APIs, and receive clean transformed responses —
  all without changing upstream services.

url: "https://leonardobai12.github.io"
baseurl: "/ProjectMiddleware"

lang: en
timezone: America/Sao_Paulo

# -------------------------
# Just-the-Docs settings
# -------------------------
color_scheme: dark
search_enabled: true
heading_anchors: true

aux_links:
  "GitHub":
    - "https://github.com/LeonardoBai12/ProjectMiddleware"

# -------------------------
# Jekyll build settings
# -------------------------
permalink: pretty

exclude:
  - "*.gem"
  - "*.gemspec"
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
  - vendor
  - .bundle
  - .sass-cache
  - .jekyll-cache
  - MappingRules.md
  - MappingRequest.md
  - PreviewRoute.md

markdown: kramdown
highlighter: rouge

kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

# -------------------------
# Plugins
# -------------------------
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag
